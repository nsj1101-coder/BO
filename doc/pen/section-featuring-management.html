<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Featuring - 인플루언서 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;600;700&display=swap">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { suit: ['SUIT', 'Pretendard', 'sans-serif'] },
          colors: {
            primary: '#4332f8',
            'primary-light': '#4332f833',
            'bg-page': '#f8f8fc',
            'border-gray': '#e5e7eb',
            'border-light': '#f3f4f6',
            'text-muted': '#9ca3af',
            'text-disabled': '#d1d5db',
            'dark-tag': '#31303d',
            'dark-border': '#d9d9d966',
          }
        }
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'SUIT', 'Pretendard', sans-serif; background: #f8f8fc; }

    /* Sidebar */
    .sidebar { width: 230px; transition: width 0.3s ease; overflow: hidden; }
    .sidebar.collapsed { width: 60px; }
    .sidebar.collapsed .menu-label,
    .sidebar.collapsed .collapse-text,
    .sidebar.collapsed .badge-count,
    .sidebar.collapsed .footer-link { opacity: 0; width: 0; overflow: hidden; white-space: nowrap; }
    .sidebar.collapsed .menu-item { justify-content: center; padding-left: 0; padding-right: 0; }
    .sidebar.collapsed .menu-icon-wrap { margin-right: 0; }

    .menu-item {
      display: flex; align-items: center; height: 60px; padding: 0 12px;
      border-radius: 100px; cursor: pointer; transition: all 0.2s ease;
      text-decoration: none; white-space: nowrap;
    }
    .menu-item:hover { background: #f3f4f6; }
    .menu-item.active { background: #4332f8; box-shadow: 0 4px 38.5px rgba(67, 50, 248, 0.2); }
    .menu-item.active:hover { background: #3a2be0; }
    .menu-item.active .menu-label { color: #fff; }
    .menu-item.active .menu-icon-wrap { background: #fff; }

    .menu-icon-wrap {
      width: 36px; height: 36px; border-radius: 100px; background: #fff;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-right: 14px;
    }
    .menu-icon-wrap img { width: 24px; height: 24px; object-fit: contain; }
    .menu-label { font-size: 16px; font-weight: 700; color: #000; line-height: 1.3; transition: opacity 0.2s; }

    .badge-count {
      width: 24px; height: 24px; border-radius: 100px; background: #4332f8;
      color: #fff; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      margin-left: auto; flex-shrink: 0; transition: opacity 0.2s;
    }

    .menu-divider { width: 200px; margin: 0 15px; border-top: 1px solid #e5e7eb; border-bottom: 1px solid #e5e7eb; }

    /* Platform tabs */
    .platform-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 14px 18px; border-radius: 100px; background: #fff;
      border: 2px solid transparent; cursor: pointer; transition: all 0.2s;
      font-size: 16px; font-weight: 700; color: #d1d5db;
    }
    .platform-tab:hover { border-color: #e5e7eb; }
    .platform-tab.active { border-color: #4332f8; color: #000; }
    .platform-tab img { width: 20px; height: 20px; }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-size: 12px; font-weight: 700; color: #000;
      text-align: left; vertical-align: middle;
      border-bottom: 1px solid #f3f4f6; border-right: 1px solid #f3f4f6;
      background: #fff;
    }
    .data-table th:last-child { border-right: none; }
    .data-table .th-account {
      width: 330px; height: 80px; padding: 0 20px;
      border-right: 1px solid #f3f4f6;
    }
    .data-table .th-sub { height: 40px; padding: 0 12px; }
    .data-table .th-note { height: 40px; padding: 0 12px; border-bottom: 1px solid #f3f4f6; }

    /* Floating side panel */
    .float-panel {
      position: absolute; right: 0; top: 164px;
      width: 60px; height: 120px; border-radius: 100px;
      border: 1px solid #d9d9d966; background: #fff;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 14px;
    }
    .float-btn {
      width: 42px; height: 42px; border-radius: 100px;
      background: #f5f6f8; display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: background 0.2s;
    }
    .float-btn:hover { background: #e5e7eb; }
    .float-btn img { width: 24px; height: 24px; }
  </style>
</head>
<body>

  <!-- ===== TOP NAV BAR ===== -->
  <header class="fixed top-0 left-0 w-full h-[100px] bg-white z-50 flex items-center px-[29px]" style="border-bottom: 1px solid #d1d5db;">
    <!-- Logo -->
    <div class="flex items-center gap-3">
      <img src="img/featuring/sN0VN.png" alt="logo" class="w-[50px] h-[50px] object-contain">
      <span class="text-[32px] font-bold text-black leading-[1.3]">featuring</span>
    </div>
    <!-- Search bar -->
    <div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-2 bg-white border border-gray-300 rounded-full w-[360px] h-[50px] px-5">
      <img src="img/featuring/D75iq.png" alt="search" class="w-[24px] h-[24px]">
      <input type="text" placeholder="계정 및 채널 검색" class="flex-1 bg-transparent outline-none text-[16px] font-medium text-black placeholder:text-text-muted font-suit">
    </div>
    <!-- Right buttons -->
    <div class="ml-auto flex items-center gap-2">
      <div class="flex items-center gap-1.5 bg-white border rounded-full px-3 py-2 cursor-pointer hover:bg-gray-50 relative">
        <img src="img/featuring/EOPEY.png" alt="알림" class="w-[20px] h-[20px]">
        <span class="text-[16px] font-bold text-black leading-none">알림 </span>
        <span class="absolute top-[7px] right-[38px] w-[10px] h-[10px] bg-red-500 rounded-full border-2 border-white"></span>
      </div>
      <div class="flex items-center gap-1.5 bg-white border rounded-full px-3 py-2 cursor-pointer hover:bg-gray-50">
        <img src="img/featuring/1cmtB.png" alt="Isla" class="w-[20px] h-[20px]">
        <span class="text-[16px] font-bold text-black leading-none">Isla</span>
      </div>
      <div class="flex items-center gap-1.5 bg-white border rounded-full px-3 py-2 cursor-pointer hover:bg-gray-50">
        <img src="img/featuring/eZ8Ja.png" alt="+4" class="w-[20px] h-[20px]">
        <span class="text-[16px] font-bold text-black leading-none">+4</span>
      </div>
    </div>
  </header>

  <!-- ===== LEFT SIDEBAR ===== -->
  <aside class="sidebar fixed top-[100px] left-[25px] z-40 flex flex-col h-[calc(100vh-100px)]" id="sidebar">

    <!-- Collapse -->
    <div class="flex items-center cursor-pointer px-[30px] py-2 select-none" id="collapseBtn">
      <img src="img/featuring/MeD98.png" alt="collapse" class="w-[24px] h-[24px]">
      <span class="collapse-text text-[12px] font-medium text-black ml-1">접기</span>
    </div>

    <!-- Menu Section 1 -->
    <nav class="flex flex-col">
      <a href="#" class="menu-item" data-menu="dashboard">
        <div class="menu-icon-wrap"><img src="img/featuring/ag6au.png" alt="대시보드"></div>
        <span class="menu-label">대시보드</span>
      </a>
      <a href="#" class="menu-item" data-menu="find">
        <div class="menu-icon-wrap"><img src="img/featuring/oT6Kl.png" alt="인플루언서 찾기"></div>
        <span class="menu-label">인플루언서 찾기</span>
      </a>
      <a href="#" class="menu-item active" data-menu="manage">
        <div class="menu-icon-wrap"><img src="img/featuring/Pcyed.png" alt="인플루언서 관리"></div>
        <span class="menu-label">인플루언서 관리</span>
      </a>
      <a href="#" class="menu-item" data-menu="ranking">
        <div class="menu-icon-wrap"><img src="img/featuring/mlWEm.png" alt="인플루언서 랭킹"></div>
        <span class="menu-label">인플루언서 랭킹</span>
      </a>
      <a href="#" class="menu-item" data-menu="ai">
        <div class="menu-icon-wrap"><img src="img/featuring/v9UaU.png" alt="AI 리스트업"></div>
        <span class="menu-label">AI 리스트업</span>
      </a>
    </nav>

    <div class="menu-divider my-2"></div>

    <!-- Menu Section 2 -->
    <nav class="flex flex-col">
      <a href="#" class="menu-item" data-menu="campaign">
        <div class="menu-icon-wrap"><img src="img/featuring/emJqZ.png" alt="캠페인 관리"></div>
        <span class="menu-label">캠페인 관리</span>
      </a>
      <a href="#" class="menu-item" data-menu="message">
        <div class="menu-icon-wrap"><img src="img/featuring/38fPt.png" alt="메시지 관리"></div>
        <span class="menu-label">메시지 관리</span>
        <span class="badge-count">2</span>
      </a>
      <a href="#" class="menu-item" data-menu="dm">
        <div class="menu-icon-wrap"><img src="img/featuring/OOdDW.png" alt="DM/이메일 관리"></div>
        <span class="menu-label">DM/이메일 관리</span>
        <span class="badge-count">2</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="mt-auto flex flex-col gap-2 pb-4">
      <a href="#" class="footer-link text-[20px] font-bold text-black px-[25px] hover:underline transition-opacity">서비스 가이드</a>
      <a href="#" class="footer-link text-[20px] font-bold text-black px-[25px] hover:underline transition-opacity">인사이트/블로그</a>
      <a href="#" class="menu-item" data-menu="logout">
        <div class="menu-icon-wrap"><img src="img/featuring/VnEvQ.png" alt="로그아웃"></div>
        <span class="menu-label">로그아웃</span>
      </a>
    </div>
  </aside>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="ml-[280px] mt-[100px] p-0 min-h-screen relative">

    <!-- Page Title -->
    <h1 class="text-[36px] font-bold text-black leading-[1.3] pt-[92px] pl-[310px] absolute top-0 left-0" style="left: 0;">인플루언서 관리</h1>

    <div class="pt-[60px] pl-[30px] pr-[30px]">

      <!-- Platform Tabs -->
      <div class="flex items-center gap-3 mb-5 flex-wrap" style="padding-top: 100px;">
        <button class="platform-tab active" data-platform="instagram">
          <img src="img/featuring/dMFTy.png" alt="인스타그램">
          <span>인스타그램</span>
        </button>
        <button class="platform-tab" data-platform="youtube">
          <img src="img/featuring/2P9UD.png" alt="유튜브">
          <span>유튜브</span>
        </button>
        <button class="platform-tab" data-platform="x">
          <img src="img/featuring/9XgUF.png" alt="엑스">
          <span>엑스</span>
        </button>
        <button class="platform-tab" data-platform="tiktok">
          <img src="img/featuring/mqebk.png" alt="틱톡">
          <span>틱톡</span>
        </button>
        <button class="platform-tab" data-platform="blog">
          <img src="img/featuring/WS5qe.png" alt="네이버 블로그">
          <span>네이버 블로그</span>
        </button>
      </div>

      <!-- Group Tag Bar -->
      <div class="flex items-center gap-1.5 bg-dark-tag rounded-[14px] px-[10px] py-[10px] mb-6 w-fit">
        <img src="img/featuring/MKASz.png" alt="group" class="w-[20px] h-[20px] opacity-30">
        <span class="text-white text-[16px] font-bold leading-[1.3] opacity-30">생성된 인플루언서 그룹 없음</span>
        <img src="img/featuring/drTPI.png" alt="chevron" class="w-[24px] h-[24px]">
      </div>

      <!-- Action Row -->
      <div class="flex items-center justify-between mb-4">
        <div class="flex items-center gap-3">
          <span class="text-[18px] text-black">총 <strong>0</strong> 명</span>
          <span class="text-[14px] text-black opacity-70">(그룹당 최대 500명까지 등록 가능)</span>
        </div>
        <div class="flex items-center gap-3">
          <!-- Bulk add button -->
          <button class="flex items-center gap-1.5 bg-white border border-text-disabled rounded-[10px] px-4 py-2.5 text-[16px] font-semibold text-black hover:bg-gray-50 transition">
            <img src="img/featuring/ReBDF.png" alt="add" class="w-[20px] h-[20px]">
            인플루언서 대량 추가
          </button>
          <!-- Excel download button -->
          <button class="flex items-center gap-1.5 bg-white border border-text-disabled rounded-[10px] px-4 py-2.5 text-[16px] font-semibold text-black hover:bg-gray-50 transition">
            <img src="img/featuring/jMGlU.png" alt="excel" class="w-[20px] h-[20px]">
            엑셀 다운로드
          </button>
          <!-- View count dropdown -->
          <div class="flex items-center gap-1 bg-white border rounded-[10px] px-4 py-2.5 cursor-pointer hover:bg-gray-50 transition">
            <span class="text-[16px] font-medium text-black">5 명씩 보기</span>
            <img src="img/featuring/mPPf3.png" alt="dropdown" class="w-[20px] h-[20px]">
          </div>
        </div>
      </div>

      <!-- Data Table Container -->
      <div class="bg-white rounded-[30px] border overflow-hidden relative">
        <!-- Table Header -->
        <table class="data-table">
          <thead>
            <tr>
              <!-- Account column (double row) -->
              <th class="th-account" rowspan="2" style="vertical-align: middle;">
                <div class="flex items-center gap-3">
                  <div class="relative">
                    <div class="w-[24px] h-[24px] rounded bg-primary border border-border-light flex items-center justify-center">
                      <img src="img/featuring/N0p9V.png" alt="check" class="w-[24px] h-[24px]">
                    </div>
                  </div>
                  <span class="text-[12px] font-bold">계정</span>
                </div>
              </th>
              <th class="th-sub" style="width:194px;">카테고리</th>
              <th class="th-sub" style="width:100px;">팔로워 수</th>
              <th class="th-sub" style="width:120px;">
                <div class="text-center">유효 팔로워 수<br>(예상)</div>
              </th>
              <th class="th-sub" style="width:70px;">ER</th>
              <th class="th-sub" style="width:120px;">
                <div class="text-center">평균 도달 수<br>(예상)</div>
              </th>
              <th class="th-sub" style="width:170px;">
                <div>평균 피드 좋아요 수<br>/평균 동영상 조회 수</div>
              </th>
              <th class="th-sub" style="width:144px;">오디언스 성별, 나이</th>
              <th class="th-sub" style="width:144px;">예상 CPR</th>
              <th class="th-sub" style="width:108px; border-right:none;">예상 광고비</th>
            </tr>
            <tr>
              <!-- Sub-header for note row spanning rest -->
              <td colspan="9" class="th-note" style="background: #fff; font-size: 12px; font-weight: 700;">
                <span style="padding-left: 226px;">참고 사항</span>
              </td>
            </tr>
          </thead>
        </table>

        <!-- Empty State -->
        <div class="flex flex-col items-center justify-center py-20">
          <img src="img/featuring/Lweur.png" alt="empty" class="w-[167px] h-[167px] object-contain mb-6">
          <p class="text-[16px] font-medium text-black opacity-50 mb-8">관리 중인 인플루언서가 없습니다.</p>
          <button class="flex items-center gap-1.5 border border-primary rounded-full px-[14px] py-[10px] bg-white hover:bg-primary/5 transition" id="addGroupBtn">
            <img src="img/featuring/G2Z4W.png" alt="add" class="w-[24px] h-[24px]" style="width: auto; height: 24px;">
            <span class="text-primary text-[16px] font-bold">새 그룹 추가</span>
          </button>
        </div>

        <!-- Floating Side Panel -->
        <div class="float-panel">
          <div class="float-btn">
            <img src="img/featuring/D0PGs.png" alt="filter">
          </div>
          <div class="float-btn">
            <img src="img/featuring/EWjyp.png" alt="sort">
          </div>
        </div>
      </div>

    </div>
  </main>

  <script>
    // Sidebar collapse
    const sidebar = document.getElementById('sidebar');
    document.getElementById('collapseBtn').addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
    });

    // Menu active state
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
        item.classList.add('active');
      });
    });

    // Platform tab switching
    document.querySelectorAll('.platform-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>

</body>
</html>
