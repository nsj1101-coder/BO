<!-- Concierge Left Column -->
<div class="flex flex-col gap-8">
  <!-- Header Area -->
  <div class="flex flex-col gap-4 max-w-[478px]">
    <span class="text-sm font-semibold tracking-[2px] text-[var(--accent-teal)]">풀서비스 컨시어지</span>
    <h2 class="text-5xl font-bold leading-[1.2] tracking-[-1.5px] text-[var(--text-dark)] font-['DM_Sans']">단순히 연결만 하지 않습니다<br>모든 것을 관리합니다</h2>
    <p class="text-base leading-[1.6] text-[var(--text-muted)] font-['DM_Sans']">한국에 도착하는 순간부터 출국까지, 저희 컨시어지 팀이 물류를 처리하여 중요한 일에 집중할 수 있도록 합니다.</p>
  </div>

  <!-- Service Cards -->
  <div class="flex flex-col gap-3">
    <!-- Card 1: 공항 픽업 -->
    <div class="flex items-center gap-4 rounded-xl border border-slate-200 px-6 py-5">
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-[#E8E0FF]">
        <i data-lucide="plane" class="h-5 w-5 text-[#7C3AED]"></i>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-base font-semibold text-[var(--text-dark)] font-['DM_Sans']">공항 픽업 및 이동</span>
        <span class="text-sm text-[var(--text-muted)] font-['DM_Sans']">인천/김포 공항에서 전용 차량 대기.</span>
      </div>
    </div>

    <!-- Card 2: 프리미엄 숙소 -->
    <div class="flex items-center gap-4 rounded-xl border border-slate-200 px-6 py-5">
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-[#DBEAFE]">
        <i data-lucide="building" class="h-5 w-5 text-[#2563EB]"></i>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-base font-semibold text-[var(--text-dark)] font-['DM_Sans']">프리미엄 숙소</span>
        <span class="text-sm text-[var(--text-muted)] font-['DM_Sans']">병원 인근 3-5성급 호텔.</span>
      </div>
    </div>

    <!-- Card 3: 통역 및 지원 -->
    <div class="flex items-center gap-4 rounded-xl border border-slate-200 px-6 py-5">
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-[#CCFBF1]">
        <i data-lucide="message-circle" class="h-5 w-5 text-[#0D9488]"></i>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-base font-semibold text-[var(--text-dark)] font-['DM_Sans']">통역 및 지원</span>
        <span class="text-sm text-[var(--text-muted)] font-['DM_Sans']">24시간 다국어 코디네이터.</span>
      </div>
    </div>

    <!-- Card 4: 비자 및 서류 -->
    <div class="flex items-center gap-4 rounded-xl border border-slate-200 px-6 py-5">
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-[#E0E0FF]">
        <i data-lucide="file-check" class="h-5 w-5 text-[#7C3AED]"></i>
      </div>
      <div class="flex flex-col gap-1">
        <span class="text-base font-semibold text-[var(--text-dark)] font-['DM_Sans']">비자 및 서류 지원</span>
        <span class="text-sm text-[var(--text-muted)] font-['DM_Sans']">초청장 및 비자 안내.</span>
      </div>
    </div>
  </div>
</div>
