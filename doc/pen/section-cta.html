<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Section - CTA New</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --color-dark-bg: #0F0D2E;
      --color-border-dark: #2D2A5E;
      --color-accent-teal: #0891B2;
      --color-text-muted: #64748B;
      --color-white: #FFFFFF;
    }
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="flex flex-col w-full h-[561px] bg-[var(--color-dark-bg)] overflow-hidden">

    <!-- Nav bar -->
    <div class="flex justify-between items-center w-full px-[60px] py-[24px]">
      <span class="text-white text-[14px] font-medium tracking-[2px]">MEDI-W ™</span>
      <div class="flex items-center gap-10">
        <span class="text-white text-[14px]">메뉴</span>
        <span class="text-white text-[14px]">지금 예약</span>
      </div>
    </div>

    <!-- CTA Content area -->
    <div class="flex flex-1 gap-[60px] px-[60px] py-[40px]">

      <!-- Left column -->
      <div class="flex flex-col w-[700px] gap-6">
        <h1 class="text-white text-[48px] font-bold leading-[1.3] max-w-[700px]">한국에서 의료 경력을 발전시킬<br>준비가 되셨나요?</h1>
        <p class="text-white text-[16px] leading-[1.7] max-w-[650px]">한국의 세계적 의료 시스템으로 향하는 관문으로 MediW를 선택한 수천 명의 의료 전문가와 함께하세요.</p>
        <div class="flex gap-4">
          <button class="text-white text-[17px] font-semibold bg-[var(--color-accent-teal)] rounded-xl px-10 py-5">모집 중인 프로그램 보기</button>
          <button class="text-white text-[17px] font-semibold border border-[var(--color-text-muted)] rounded-xl px-10 py-5">문의하기</button>
        </div>
      </div>

      <!-- Right column -->
      <div class="flex-1 relative h-[350px]">
        <img
          src="https://images.unsplash.com/photo-1728676839129-2e9417e07414?crop=entropy&cs=tinysrgb&fit=max&fm=jpg&ixlib=rb-4.1.0&q=80&w=1080"
          alt="CTA image"
          class="absolute right-0 top-0 w-[500px] h-[320px] object-cover rounded-2xl"
        >
      </div>

    </div>

    <!-- Footer bottom -->
    <div class="px-[60px] py-[24px] pb-[32px]">
      <p class="text-white text-[13px] max-w-[800px]">직관적인 플랫폼으로 실시간 예약과 즉시 확인이 가능한 맞춤 의료진을 찾아 예약하세요.</p>
    </div>

  </div>
</body>
</html>
